<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Signage – Verwaltung</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 520px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 1rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    .slide-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .slide-row:last-child { border-bottom: none; }

    .slide-info { flex: 1; }
    .slide-name {
      font-size: 1rem;
      font-weight: 600;
      color: #222;
    }
    .slide-url {
      font-size: 0.78rem;
      color: #999;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 300px;
    }

    /* Toggle Switch */
    .toggle {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
      flex-shrink: 0;
      margin-left: 16px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 28px;
      transition: .3s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px; width: 20px;
      left: 4px; bottom: 4px;
      background: white;
      border-radius: 50%;
      transition: .3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    input:checked + .slider { background: #4CAF50; }
    input:checked + .slider:before { transform: translateX(24px); }

    .status-text {
      font-size: 0.8rem;
      margin-top: 3px;
      font-weight: 500;
    }
    .status-text.on  { color: #4CAF50; }
    .status-text.off { color: #f44336; }

    .save-btn {
      display: block;
      width: 100%;
      max-width: 520px;
      padding: 15px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #2d2d5a; }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #4CAF50;
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.35s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .hint {
      font-size: 0.82rem;
      color: #aaa;
      text-align: center;
      margin-top: 12px;
    }
    .toast.error { background: #f44336; }
  </style>
</head>
<body>

  <h1>📺 Digital Signage</h1>
  <p class="subtitle">Verwaltung – Seiten ein- oder ausschalten</p>

  <div class="card">
    <h2>Anzeigeseiten</h2>
    <div id="slide-list">Lädt…</div>
  </div>

  <button class="save-btn" onclick="saveSettings()">💾 Speichern</button>
  <p class="hint">✅ Der Monitor erkennt Änderungen automatisch und lädt sich neu (ca. 10 Sek.).</p>

  <div class="toast" id="toast">✅ Gespeichert!</div>

  <script src="config.js"></script>
  <script>
    const STORAGE_KEY = 'signage_enabled_overrides';

    function loadOverrides() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function buildList() {
      const overrides = loadOverrides();
      const list = document.getElementById('slide-list');
      list.innerHTML = '';

      window.SIGNAGE_CONFIG.slides.forEach(slide => {
        // Aktueller Status: Override hat Vorrang, sonst config.js-Wert
        const isEnabled = (slide.id in overrides)
          ? overrides[slide.id]
          : (slide.enabled !== false);

        const row = document.createElement('div');
        row.className = 'slide-row';
        row.innerHTML = `
          <div class="slide-info">
            <div class="slide-name">${slide.title}</div>
            <div class="slide-url">${slide.url || ''}</div>
            <div class="status-text ${isEnabled ? 'on' : 'off'}" id="status-${slide.id}">
              ${isEnabled ? '● Aktiv' : '● Ausgeblendet'}
            </div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="toggle-${slide.id}"
              ${isEnabled ? 'checked' : ''}
              onchange="updateStatus('${slide.id}', this.checked)">
            <span class="slider"></span>
          </label>
        `;
        list.appendChild(row);
      });
    }

    function updateStatus(id, checked) {
      const el = document.getElementById('status-' + id);
      el.textContent = checked ? '● Aktiv' : '● Ausgeblendet';
      el.className = 'status-text ' + (checked ? 'on' : 'off');
    }

    function saveSettings() {
      const overrides = {};
      window.SIGNAGE_CONFIG.slides.forEach(slide => {
        const cb = document.getElementById('toggle-' + slide.id);
        if (cb) overrides[slide.id] = cb.checked;
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
      showToast();
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    buildList();
  </script>
</body>
</html>
